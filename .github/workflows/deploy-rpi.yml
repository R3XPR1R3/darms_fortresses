name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test

  deploy:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and restart containers
        run: |
          docker compose -f infra/docker/docker-compose.yml build
          docker compose -f infra/docker/docker-compose.yml up -d
          docker image prune -f

      - name: Show tunnel URL
        run: |
          echo "Waiting for cloudflared to start..."
          sleep 5
          docker compose -f infra/docker/docker-compose.yml logs tunnel | grep -oP 'https://[^\s]+'  || echo "Check tunnel logs: docker compose -f infra/docker/docker-compose.yml logs tunnel"
