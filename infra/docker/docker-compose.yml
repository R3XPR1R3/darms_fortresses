services:
  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    container_name: darms-fortresses
    expose:
      - "80"
    volumes:
      - match-logs:/data/match-logs
    environment:
      - LOGS_DIR=/data/match-logs

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    container_name: darms-tunnel
    command: tunnel --no-autoupdate --url http://app:80
    depends_on:
      - app

volumes:
  match-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/darms-fortresses/match-logs
