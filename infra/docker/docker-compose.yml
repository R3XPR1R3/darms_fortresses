services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: darms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-darms}
      POSTGRES_USER: ${POSTGRES_USER:-darms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darms_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-darms}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    container_name: darms-fortresses
    expose:
      - "80"
    volumes:
      - match-logs:/data/match-logs
    environment:
      - LOGS_DIR=/data/match-logs
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:-change-me}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-darms}
      - POSTGRES_USER=${POSTGRES_USER:-darms}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-darms_secret}
    depends_on:
      postgres:
        condition: service_healthy

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    container_name: darms-tunnel
    command: tunnel --no-autoupdate --url http://app:80
    depends_on:
      - app

volumes:
  match-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/darms-fortresses/match-logs
  pgdata:
