<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Darms: Fortresses</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-size: 14px;
    }
    h1 { font-size: 22px; text-align: center; margin-bottom: 8px; color: #e94560; letter-spacing: 1px; }
    h2 { font-size: 15px; margin-bottom: 6px; color: #0f3460; background: #e94560; padding: 4px 8px; border-radius: 4px; }
    .hint { font-size: 12px; color: #aaa; margin: 6px 0; }

    /* Layout — menu/lobby */
    #app { max-width: 600px; margin: 0 auto; padding: 8px; }

    /* ===== GAME TABLE ===== */
    /*
      Layout:
      ┌───────────────────────────────────┐
      │          Turn Banner              │
      ├──────┬─────────────────┬──────────┤
      │ Opp  │  Opp districts  │  My      │
      │ Hero │  ───────────    │  Hero    │
      │ Panel│  My districts   │  Panel   │
      ├──────┴─────────────────┴──────────┤
      │       Actions + Resources         │
      ├───────────────────────────────────┤
      │          Hand cards               │
      ├───────────────────────────────────┤
      │          Bans / Log               │
      └───────────────────────────────────┘
    */
    #game-board {
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto 1fr auto auto auto;
      height: 100vh;
      height: 100dvh;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* Row 1: Banner */
    #turn-banner {
      grid-column: 1 / -1;
      grid-row: 1;
      background: linear-gradient(90deg, #0f3460, #16213e);
      border-bottom: 2px solid #0f3460;
      padding: 4px 12px;
      text-align: center;
      font-size: 13px;
      color: #aaa;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #turn-banner.my-turn {
      background: linear-gradient(90deg, #e94560, #c02040);
      color: #fff; font-weight: 700;
      animation: pulse-banner 1.5s ease-in-out infinite;
    }
    @keyframes pulse-banner {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    #turn-banner svg { width: 18px; height: 18px; }
    #turn-banner .hero-portrait { border-radius: 50%; vertical-align: middle; }

    /* Row 2 col 1: Opponent hero panel */
    #opp-hero-panel {
      grid-column: 1;
      grid-row: 2;
      width: 130px;
      background: #12182a;
      border-right: 1px solid #0f3460;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }

    /* Row 2 col 2: Center table (both district boards stacked) */
    #table-center {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: relative;
    }
    #opp-board-area {
      flex: 1;
      background: #12182a;
      padding: 8px;
      border-bottom: 2px solid #0f3460;
      display: flex;
      flex-direction: column;
    }
    #my-board-area {
      flex: 1;
      background: #16213e;
      padding: 8px;
      display: flex;
      flex-direction: column;
    }

    /* Draft overlay — covers table center during draft */
    #draft-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      overflow-y: auto;
      padding: 8px;
      background: rgba(18, 24, 42, 0.97);
      display: none;
    }
    #draft-overlay.show { display: block; }

    /* Row 2 col 3: My hero panel */
    #my-hero-panel {
      grid-column: 3;
      grid-row: 2;
      width: 130px;
      background: #16213e;
      border-left: 1px solid #0f3460;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }

    /* Row 3: Actions */
    #actions-bar {
      grid-column: 1 / -1;
      grid-row: 3;
      background: #0d1117;
      border-top: 2px solid #0f3460;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 36px;
    }
    #actions-bar:empty { min-height: 0; padding: 0; }

    /* Row 4: Hand */
    #hand-area {
      grid-column: 1 / -1;
      grid-row: 4;
      background: #0d1117;
      border-top: 1px solid #1a1f2e;
      padding: 6px 12px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      overflow-x: auto;
      min-height: 0;
    }
    #hand-area:empty { display: none; }

    /* Row 5: Footer */
    #footer-bar {
      grid-column: 1 / -1;
      grid-row: 5;
      display: flex;
      flex-direction: column;
    }

    /* ===== HERO PANELS ===== */
    .hero-panel-portrait {
      text-align: center;
      cursor: pointer;
      position: relative;
    }
    .hero-panel-portrait .hero-portrait {
      border-radius: 50%;
      border: 2px solid var(--hero-clr, #e94560);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--hero-clr, #e94560) 40%, transparent);
      transition: transform 0.2s;
    }
    .hero-panel-portrait:hover .hero-portrait { transform: scale(1.1); }
    .hero-panel-name {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--hero-clr, #e94560);
      margin-top: 4px;
      line-height: 1.2;
    }
    .hero-panel-speed {
      text-align: center;
      font-size: 10px;
      color: #888;
    }
    .hero-panel-ability {
      font-size: 9px;
      background: #0f3460;
      color: #aaa;
      padding: 4px 6px;
      border-radius: 4px;
      text-align: center;
      line-height: 1.3;
    }
    .hero-panel-stats {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 11px;
      color: #ccc;
      padding: 4px 0;
    }
    .hero-panel-stats .stat-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hero-panel-divider {
      border: none;
      border-top: 1px solid #0f3460;
      margin: 2px 0;
    }
    .hero-panel-companion {
      font-size: 10px;
      color: #aaa;
      background: #0d1117;
      padding: 6px;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      border: 1px solid transparent;
    }
    .hero-panel-companion:hover { border-color: #0f3460; }
    .hero-panel-companion .companion-name {
      font-size: 11px;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 2px;
    }
    .hero-panel-sleep {
      text-align: center;
      font-size: 28px;
      opacity: 0.4;
      margin: 8px 0;
    }
    .hero-panel-label {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding-bottom: 4px;
      border-bottom: 1px solid #0f3460;
    }

    /* ===== BOARD SECTIONS ===== */
    .board-label {
      font-size: 10px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-align: center;
    }
    .board-districts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      flex: 1;
    }
    .opp-assassinated {
      text-align: center;
      color: #e94560;
      font-size: 11px;
      margin-top: 4px;
    }

    /* ===== OPPONENT TABS ===== */
    .opp-tabs-row {
      display: flex;
      gap: 2px;
      margin-bottom: 4px;
    }
    .opp-tab {
      flex: 1;
      padding: 3px 4px;
      text-align: center;
      font-size: 9px;
      cursor: pointer;
      border: none;
      background: #0d1117;
      color: #888;
      border-bottom: 2px solid transparent;
      border-radius: 3px 3px 0 0;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .opp-tab:hover { background: #16213e; }
    .opp-tab.active {
      color: #eee;
      border-bottom-color: var(--hero-clr, #e94560);
      background: #16213e;
    }
    .opp-tab.is-current-turn { color: var(--hero-clr, #e94560); }
    .opp-tab .tab-hero { font-size: 10px; color: var(--hero-clr, #e94560); }
    .opp-tab .tab-hero .hero-portrait { border-radius: 50%; vertical-align: middle; border: 1px solid var(--hero-clr, #e94560); }
    .opp-tab .tab-stats { font-size: 9px; color: #666; }
    .opp-tab .tab-sleep { font-size: 10px; opacity: 0.5; }
    .opp-tab .active-arrow { color: var(--hero-clr, #e94560); font-size: 9px; }

    /* ===== TOOLTIP ===== */
    .tooltip-host { position: relative; }
    .tooltip-content {
      display: none;
      position: absolute;
      z-index: 50;
      background: #16213e;
      border: 1px solid #e94560;
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      color: #ccc;
      width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      line-height: 1.4;
      pointer-events: none;
    }
    .tooltip-content .tt-name { color: var(--hero-clr, #e94560); font-weight: 700; font-size: 13px; margin-bottom: 4px; }
    .tooltip-content .tt-class { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .tooltip-content .tt-ability { color: var(--hero-clr, #e94560); font-weight: 600; margin-top: 6px; }
    .tooltip-content .tt-desc { color: #aaa; margin-top: 2px; }
    /* Desktop hover */
    .tooltip-host:hover .tooltip-content { display: block; }
    /* Position variants */
    .tooltip-right .tooltip-content { left: calc(100% + 8px); top: 0; }
    .tooltip-left .tooltip-content { right: calc(100% + 8px); top: 0; }

    /* ===== HAND CARDS ===== */
    .hand-card {
      width: 72px;
      min-height: 96px;
      border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.15);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 4px 3px;
      font-size: 9px;
      text-align: center;
      line-height: 1.2;
      color: #000;
      font-weight: 600;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      transform-origin: bottom center;
    }
    .hand-card:hover { transform: translateY(-12px) scale(1.08); border-color: #e94560; box-shadow: 0 4px 12px rgba(233,69,96,0.4); z-index: 5; }
    .hand-card .card-cost {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .hand-card .card-name-text {
      flex: 1; display: flex; align-items: center;
      word-break: break-word; hyphens: auto;
    }
    .hand-card .card-texture {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; image-rendering: pixelated; opacity: 0.2;
      pointer-events: none; z-index: 0;
    }
    .hand-card > * { position: relative; z-index: 1; }
    .hand-card .card-colors { display: none; }
    .hand-card .btn-build {
      width: 100%; font-size: 9px !important;
      padding: 4px 6px !important; border-radius: 4px;
    }
    .btn-build { font-size: 10px !important; padding: 2px 6px !important; }

    /* ===== DISTRICT CARDS ===== */
    .district-card {
      width: 100%; aspect-ratio: 5 / 6;
      border-radius: 6px; color: #000; font-weight: 600;
      display: inline-flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 4px 3px; font-size: 9px; text-align: center;
      border: 1.5px solid rgba(255,255,255,0.15);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      line-height: 1.2; position: relative; overflow: hidden;
    }
    .district-card .card-cost-badge {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .district-card .card-name {
      flex: 1; display: flex; align-items: center;
      word-break: break-word; hyphens: auto; padding: 1px 0;
    }
    .district-card .card-hp {
      font-size: 8px; opacity: 0.8;
      background: rgba(0,0,0,0.15); padding: 1px 4px; border-radius: 3px;
    }
    .district-card svg { width: 10px; height: 10px; }
    .district-card .card-texture {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; image-rendering: pixelated; opacity: 0.25;
      pointer-events: none; z-index: 0;
    }
    .district-card > * { position: relative; z-index: 1; }
    .color-yellow { background: #f0c040; }
    .color-blue { background: #4090f0; color: #fff; }
    .color-green { background: #40c060; }
    .color-red { background: #e04050; color: #fff; }
    .color-purple { background: #9060e0; color: #fff; }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 8px 14px; border: none; border-radius: 6px;
      font-size: 13px; cursor: pointer; font-weight: 600;
      transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn svg { width: 18px; height: 18px; }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #fff; }
    .btn-gold { background: #f0c040; color: #000; }
    .btn-card { background: #4090f0; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-large { width: 100%; max-width: 280px; padding: 12px 16px !important; font-size: 15px !important; }

    /* ===== DRAFT CARDS ===== */
    .draft-heroes {
      display: flex; flex-wrap: nowrap; gap: 6px;
      justify-content: center; padding: 4px 0;
      overflow-x: auto;
    }
    .hero-card {
      width: 0; min-width: 0; flex: 1 1 0;
      border-radius: 10px; border: 2px solid #0f3460;
      background: linear-gradient(180deg, #1a1a3e 0%, #16213e 100%);
      color: #eee; cursor: pointer; font-size: 11px;
      transition: all 0.2s;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; position: relative;
    }
    .hero-card:hover {
      border-color: var(--hero-clr, #e94560);
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5), 0 0 12px color-mix(in srgb, var(--hero-clr, #e94560) 30%, transparent);
    }
    .hero-card-portrait { width: 100%; height: 72px; overflow: hidden; background: #0d1117; }
    .hero-card-portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-card-body { padding: 6px 8px; display: flex; flex-direction: column; gap: 2px; }
    .hero-card-class {
      font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--hero-clr, #888); font-weight: 700;
      display: flex; align-items: center; gap: 4px;
    }
    .hero-card-color-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .hero-card-name { font-size: 11px; font-weight: 700; color: #eee; line-height: 1.2; }
    .hero-card-speed { font-size: 10px; color: #888; }
    .hero-card-ability { font-size: 10px; font-weight: 600; color: var(--hero-clr, #e94560); margin-top: 2px; }
    .hero-card-desc { font-size: 9px; color: #888; line-height: 1.3; margin-top: 2px; }
    .draft-timer {
      font-size: 14px; font-weight: 700; color: #f0c040;
      background: #0f3460; padding: 2px 8px; border-radius: 4px; margin-left: 8px;
    }
    .draft-timer.timer-urgent { color: #fff; background: #e94560; animation: pulse-banner 0.8s ease-in-out infinite; }
    .turn-timer {
      font-size: 13px; font-weight: 700; color: #f0c040;
      background: #0f3460; padding: 2px 8px; border-radius: 4px; margin-left: 8px;
    }
    .turn-timer.timer-urgent { color: #fff; background: #e94560; animation: pulse-banner 0.8s ease-in-out infinite; }

    /* Companion choices in draft */
    .companion-choices { display: flex; flex-direction: column; gap: 6px; align-items: center; padding: 8px 0; }
    .companion-btn { width: 100%; max-width: 400px; text-align: left; font-size: 12px !important; }

    /* Bans */
    .bans { font-size: 11px; color: #888; margin-top: 4px; text-align: center; }
    .bans .ban-up { color: #e94560; }
    .bans .ban-up .hero-portrait { border-radius: 50%; vertical-align: middle; opacity: 0.6; }
    .btn .hero-portrait { border-radius: 50%; vertical-align: middle; }
    .hero-portrait { object-fit: cover; }

    /* Ban list */
    #ban-list { font-size: 11px; color: #888; text-align: center; padding: 4px 8px; background: #0d1117; border-top: 1px solid #1a1f2e; }
    #ban-list:empty { display: none; }
    #ban-list .ban-up { color: #e94560; }
    #ban-list .ban-up .hero-portrait { border-radius: 50%; vertical-align: middle; opacity: 0.6; }

    /* Log */
    #log-toggle {
      display: block; width: 100%; padding: 3px;
      background: #0d1117; border: 1px solid #333; border-radius: 4px;
      color: #666; font-size: 10px; cursor: pointer; text-align: center;
    }
    #log-toggle:hover { color: #aaa; }
    #game-log {
      display: none; background: #0d1117; border: 1px solid #333;
      border-radius: 0 0 6px 6px; padding: 4px 6px;
      max-height: 100px; overflow-y: auto; font-size: 10px; line-height: 1.5;
    }
    #game-log.show { display: block; }
    #game-log .log-entry { color: #8b949e; }
    #game-log .log-entry .day-tag { color: #e94560; font-weight: bold; }

    /* Menu */
    .menu-screen { display: flex; flex-direction: column; gap: 10px; padding: 20px 0; align-items: center; }
    .menu-title { font-size: 14px; color: #888; margin-bottom: 10px; }
    .btn-small { font-size: 11px; padding: 4px 12px; border-radius: 4px; min-width: auto; }
    .menu-input {
      background: #16213e; border: 1px solid #0f3460; color: #eee;
      padding: 10px 14px; border-radius: 8px; font-size: 14px;
      width: 100%; max-width: 280px; text-align: center;
    }
    .menu-input:focus { outline: none; border-color: #e94560; }
    .menu-divider { color: #555; font-size: 12px; margin: 6px 0; }

    /* Lobby */
    .lobby-screen { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 0; }
    .room-code {
      font-size: 20px; color: #e94560; background: #16213e;
      padding: 10px 20px; border-radius: 8px; border: 2px dashed #e94560; letter-spacing: 3px;
    }
    .lobby-info { font-size: 12px; color: #888; }
    .lobby-players { display: flex; flex-direction: column; gap: 4px; width: 100%; max-width: 300px; }
    .lobby-player {
      background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
      padding: 8px 12px; font-size: 14px;
    }
    .lobby-player.host { border-color: #e94560; }
    .lobby-count { font-size: 13px; color: #888; }
    .lobby-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    /* Ability modal */
    #ability-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      justify-content: center; align-items: center;
    }
    #ability-modal.show { display: flex; }
    #ability-modal .modal-content {
      background: #16213e; border: 1px solid #e94560;
      border-radius: 12px; padding: 16px; max-width: 90%; width: 350px;
    }
    #ability-modal h3 { margin-bottom: 10px; color: #e94560; font-size: 14px; }
    .modal-options { display: flex; flex-direction: column; gap: 6px; }
    .modal-option {
      padding: 8px 12px; border-radius: 6px; border: 1px solid #0f3460;
      background: #1a1a2e; color: #eee; cursor: pointer; font-size: 12px;
      text-align: left; display: flex; align-items: center; gap: 6px;
    }
    .modal-option svg { width: 20px; height: 20px; flex-shrink: 0; }
    .modal-option .hero-portrait { border-radius: 50%; flex-shrink: 0; }
    .modal-option:hover { border-color: #e94560; }

    /* Winner */
    #winner-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 200;
      justify-content: center; align-items: center;
    }
    #winner-overlay.show { display: flex; }
    #winner-overlay .winner-card {
      text-align: center; padding: 24px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      border-radius: 16px; font-size: 20px; font-weight: bold; max-width: 90%;
    }

    /* Portrait phone hint */
    @media (max-width: 600px) and (orientation: portrait) {
      #landscape-hint {
        display: flex; position: fixed; inset: 0;
        background: rgba(0,0,0,0.85); z-index: 300;
        justify-content: center; align-items: center;
        flex-direction: column; gap: 12px; color: #aaa; font-size: 14px;
      }
      #landscape-hint .rotate-icon { font-size: 48px; animation: rotate-hint 2s ease-in-out infinite; }
      @keyframes rotate-hint {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
      }
      #landscape-hint .dismiss-btn {
        margin-top: 8px; padding: 8px 16px;
        background: #0f3460; border: 1px solid #e94560;
        color: #eee; border-radius: 6px; cursor: pointer; font-size: 12px;
      }
    }
    @media (min-width: 601px), (orientation: landscape) {
      #landscape-hint { display: none !important; }
    }

    /* Small screens */
    @media (max-height: 500px) {
      .hand-card { width: 64px; min-height: 84px; font-size: 8px; }
      .hand-card .card-cost { width: 18px; height: 18px; font-size: 11px; }
      .district-card { font-size: 8px; }
      .district-card .card-cost-badge { width: 18px; height: 18px; font-size: 11px; }
      #opp-hero-panel, #my-hero-panel { width: 100px; padding: 4px; }
      .hero-panel-name { font-size: 10px; }
      .hero-panel-ability { font-size: 8px; }
    }
    @media (max-width: 700px) {
      #opp-hero-panel, #my-hero-panel { width: 100px; padding: 4px; }
      .hero-panel-name { font-size: 10px; }
      .hero-panel-ability { font-size: 8px; padding: 3px 4px; }
      .hero-panel-companion { font-size: 9px; padding: 4px; }
    }
  </style>
</head>

    <button class="dismiss-btn" onclick="this.parentElement.style.display='none'">OK, продолжить / Continue</button>
  </div>
  <div id="app">

  </div>
