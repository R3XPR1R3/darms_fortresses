<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Darms: Fortresses</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 8px;
      font-size: 14px;
    }
    h1 { font-size: 22px; text-align: center; margin-bottom: 8px; color: #e94560; letter-spacing: 1px; }
    h2 { font-size: 15px; margin-bottom: 6px; color: #0f3460; background: #e94560; padding: 4px 8px; border-radius: 4px; }
    .phase-label { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .hint { font-size: 12px; color: #aaa; margin: 6px 0; }

    /* Layout */
    #app { max-width: 600px; margin: 0 auto; }

    /* Menu screen */
    .menu-screen {
      display: flex; flex-direction: column; gap: 10px;
      padding: 20px 0; align-items: center;
    }
    .menu-title { font-size: 14px; color: #888; margin-bottom: 10px; }
    .menu-input {
      background: #16213e; border: 1px solid #0f3460; color: #eee;
      padding: 10px 14px; border-radius: 8px; font-size: 14px;
      width: 100%; max-width: 280px; text-align: center;
    }
    .menu-input:focus { outline: none; border-color: #e94560; }
    .menu-divider { color: #555; font-size: 12px; margin: 6px 0; }
    .btn-large { width: 100%; max-width: 280px; padding: 12px 16px !important; font-size: 15px !important; }

    /* Lobby */
    .lobby-screen {
      display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 0;
    }
    .room-code {
      font-size: 20px; color: #e94560; background: #16213e;
      padding: 10px 20px; border-radius: 8px; border: 2px dashed #e94560;
      letter-spacing: 3px;
    }
    .lobby-info { font-size: 12px; color: #888; }
    .lobby-players { display: flex; flex-direction: column; gap: 4px; width: 100%; max-width: 300px; }
    .lobby-player {
      background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
      padding: 8px 12px; font-size: 14px;
    }
    .lobby-player.host { border-color: #e94560; }
    .lobby-count { font-size: 13px; color: #888; }
    .lobby-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    /* Player cards */
    .player-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 6px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .player-card.active { border-color: #e94560; box-shadow: 0 0 8px rgba(233,69,96,0.4); }
    .player-card.me { border-left: 3px solid #4090f0; }
    .player-header { display: flex; justify-content: space-between; align-items: center; }
    .player-card .name { font-weight: bold; font-size: 14px; }
    .player-card .hero-line { margin-top: 2px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 4px;
      color: #e94560; font-size: 12px;
    }
    .hero-badge svg { vertical-align: middle; width: 20px; height: 20px; }
    .speed-badge {
      background: #0f3460; color: #aaa; font-size: 10px;
      padding: 1px 5px; border-radius: 4px;
    }
    .status-dead { font-size: 16px; }
    .player-card .stats { font-size: 12px; color: #aaa; margin-top: 2px; }
    .player-card .districts {
      display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px;
    }

    /* District chips */
    .district-chip {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      color: #000;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }
    .district-chip svg { width: 8px; height: 8px; }
    .color-yellow { background: #f0c040; }
    .color-blue { background: #4090f0; }
    .color-green { background: #40c060; }
    .color-red { background: #e04050; }
    .color-multi { background: linear-gradient(135deg, #4090f0, #40c060); }

    /* Hand */
    #hand-area {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 8px;
      margin: 8px 0;
    }
    #hand-area h3 { font-size: 13px; margin-bottom: 6px; color: #e94560; }
    .hand-cards { display: flex; flex-wrap: wrap; gap: 4px; }
    .hand-card {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .hand-card:hover { transform: scale(1.05); border-color: #e94560; }
    .hand-card .card-cost { font-weight: bold; }
    .hand-card .card-colors { display: flex; gap: 1px; }
    .hand-card .card-colors svg { width: 8px; height: 8px; }
    .btn-build { font-size: 10px !important; padding: 2px 6px !important; }

    /* Action buttons */
    #actions {
      display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0;
    }
    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn svg { width: 18px; height: 18px; }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #fff; }
    .btn-gold { background: #f0c040; color: #000; }
    .btn-card { background: #4090f0; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Draft */
    #draft-area { margin: 8px 0; }
    .draft-heroes { display: flex; flex-wrap: wrap; gap: 6px; }
    .hero-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: 2px solid #0f3460;
      background: #16213e;
      color: #eee;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 90px;
    }
    .hero-btn:hover { border-color: #e94560; background: #1a1a3e; transform: scale(1.05); }
    .hero-btn .speed { color: #aaa; font-size: 10px; }
    .hero-btn-icon svg { width: 40px; height: 40px; }
    .hero-btn-name { font-weight: 600; font-size: 11px; }

    /* Bans */
    .bans { font-size: 11px; color: #888; margin-top: 4px; }
    .bans .ban-up { color: #e94560; }
    .bans .ban-up svg { width: 14px; height: 14px; vertical-align: middle; }

    /* Log */
    #log {
      background: #0d1117;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px;
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.6;
    }
    #log .log-entry { color: #8b949e; }
    #log .log-entry .day-tag { color: #e94560; font-weight: bold; }

    /* Ability modal */
    #ability-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    #ability-modal.show { display: flex; }
    #ability-modal .modal-content {
      background: #16213e;
      border: 1px solid #e94560;
      border-radius: 12px;
      padding: 16px;
      max-width: 90%;
      width: 350px;
    }
    #ability-modal h3 { margin-bottom: 10px; color: #e94560; font-size: 14px; }
    .modal-options { display: flex; flex-direction: column; gap: 6px; }
    .modal-option {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #eee;
      cursor: pointer;
      font-size: 12px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .modal-option svg { width: 20px; height: 20px; flex-shrink: 0; }
    .modal-option:hover { border-color: #e94560; }

    /* Winner */
    #winner-banner {
      display: none;
      text-align: center;
      padding: 16px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      border-radius: 12px;
      margin: 8px 0;
      font-size: 18px;
      font-weight: bold;
    }
    #winner-banner.show { display: block; }
  </style>
</head>
<body>
  <div id="app">
    <h1>⚔ Darms: Fortresses</h1>
    <div id="phase-label" class="phase-label"></div>
    <div id="winner-banner"></div>
    <div id="players-area"></div>
    <div id="draft-area"></div>
    <div id="hand-area" style="display:none">
      <h3>Рука</h3>
      <div class="hand-cards" id="hand-cards"></div>
    </div>
    <div id="actions"></div>
    <div id="ability-modal">
      <div class="modal-content">
        <h3 id="modal-title"></h3>
        <div class="modal-options" id="modal-options"></div>
      </div>
    </div>
    <div id="log"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
