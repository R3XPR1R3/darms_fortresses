<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Darms: Fortresses</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-size: 14px;
    }
    h1 { font-size: 22px; text-align: center; margin-bottom: 8px; color: #e94560; letter-spacing: 1px; }
    h2 { font-size: 15px; margin-bottom: 6px; color: #0f3460; background: #e94560; padding: 4px 8px; border-radius: 4px; }
    .phase-label { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .hint { font-size: 12px; color: #aaa; margin: 6px 0; }

    /* Layout — menu/lobby */
    #app { max-width: 600px; margin: 0 auto; padding: 8px; }

    /* ===== GAME BOARD LAYOUT ===== */
    #game-board {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
    }

    /* -- Turn Banner -- */
    #turn-banner {
      background: linear-gradient(90deg, #0f3460, #16213e);
      border-bottom: 2px solid #0f3460;
      padding: 6px 12px;
      text-align: center;
      font-size: 13px;
      color: #aaa;
      flex-shrink: 0;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #turn-banner.my-turn {
      background: linear-gradient(90deg, #e94560, #c02040);
      color: #fff;
      font-weight: 700;
      animation: pulse-banner 1.5s ease-in-out infinite;
    }
    @keyframes pulse-banner {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    #turn-banner svg { width: 18px; height: 18px; }
    #turn-banner .hero-portrait { border-radius: 50%; vertical-align: middle; }

    /* -- Opponent Tabs -- */
    #opponent-tabs {
      display: flex;
      gap: 0;
      flex-shrink: 0;
      background: #0d1117;
      border-bottom: 1px solid #0f3460;
    }
    .opp-tab {
      flex: 1;
      padding: 8px 6px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: #0d1117;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .opp-tab:hover { background: #16213e; }
    .opp-tab.active {
      color: #eee;
      border-bottom-color: var(--hero-clr, #e94560);
      background: #16213e;
    }
    .opp-tab.is-current-turn {
      color: var(--hero-clr, #e94560);
    }
    .opp-tab .tab-hero { font-size: 10px; color: var(--hero-clr, #e94560); }
    .opp-tab .tab-hero svg { width: 14px; height: 14px; vertical-align: middle; }
    .opp-tab .tab-hero .hero-portrait { border-radius: 50%; vertical-align: middle; border: 1px solid var(--hero-clr, #e94560); }
    .opp-tab .tab-stats { font-size: 10px; color: #666; }
    .opp-tab .tab-sleep { font-size: 12px; opacity: 0.5; }
    .opp-tab .active-arrow { color: var(--hero-clr, #e94560); font-size: 10px; line-height: 1; }

    /* -- Opponent Board -- */
    #opponent-board {
      flex: 1;
      min-height: 120px;
      overflow-y: auto;
      padding: 8px;
      background: #12182a;
      border-bottom: 1px solid #0f3460;
    }
    .opp-hero-display {
      text-align: center;
      margin-bottom: 8px;
      position: relative;
    }
    .opp-hero-display .hero-icon-large .hero-portrait {
      border-radius: 50%;
      border: 2px solid var(--hero-clr, #e94560);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--hero-clr, #e94560) 40%, transparent);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .opp-hero-display .hero-icon-large .hero-portrait:hover { transform: scale(1.1); }
    .opp-hero-display .hero-name { font-size: 14px; font-weight: 600; color: var(--hero-clr, #e94560); }
    .opp-hero-display .hero-speed { font-size: 11px; color: #888; }
    .opp-hero-display .sleep-display { font-size: 32px; opacity: 0.4; margin: 4px 0; }
    .opp-stats-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      font-size: 13px;
      color: #aaa;
      margin: 6px 0;
    }
    .opp-companion { font-size: 11px; color: #888; text-align: center; margin: 4px 0; }
    .opp-districts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 4px 0;
    }
    .opp-assassinated {
      text-align: center;
      color: #e94560;
      font-size: 13px;
      margin-top: 4px;
    }

    /* -- Center Area (Draft / phase info) -- */
    #center-area {
      flex-shrink: 0;
      max-height: 40vh;
      overflow-y: auto;
      padding: 4px 6px;
    }

    /* -- My Board -- */
    #my-board {
      flex-shrink: 0;
      background: #16213e;
      border-top: 2px solid #0f3460;
      padding: 6px;
      overflow-y: auto;
      max-height: 38vh;
      position: relative;
    }
    .my-hero-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .my-hero-row .hero-icon-large .hero-portrait {
      border-radius: 50%;
      border: 2px solid var(--hero-clr, #e94560);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--hero-clr, #e94560) 30%, transparent);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .my-hero-row .hero-icon-large .hero-portrait:hover { transform: scale(1.1); }
    .my-hero-row .my-hero-info { flex: 1; }
    .my-hero-row .my-hero-name { font-size: 14px; font-weight: 700; color: var(--hero-clr, #e94560); }
    .my-hero-row .my-hero-speed { font-size: 11px; color: #888; }
    .my-hero-row .my-hero-ability-tag {
      font-size: 10px;
      background: #0f3460;
      color: #aaa;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .my-stats-bar {
      display: flex;
      gap: 10px;
      font-size: 12px;
      color: #ccc;
      margin-bottom: 4px;
      padding: 2px 0;
      border-bottom: 1px solid #0f3460;
    }
    .my-companion {
      font-size: 11px;
      color: #aaa;
      background: #0d1117;
      padding: 4px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .my-companion .companion-name { font-weight: 600; color: #ccc; }
    .my-districts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-bottom: 4px;
      padding: 4px 0;
    }
    .my-districts:empty { display: none; }

    /* -- Hand -- */
    #my-hand { margin-bottom: 4px; }
    #my-hand h3 { font-size: 11px; color: #e94560; margin-bottom: 2px; }
    .hand-cards { display: flex; flex-wrap: wrap; gap: 4px; }
    .hand-card {
      width: 72px;
      min-height: 96px;
      border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.15);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 4px 3px;
      font-size: 9px;
      text-align: center;
      line-height: 1.2;
      color: #000;
      font-weight: 600;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .hand-card:hover { transform: scale(1.08); border-color: #e94560; box-shadow: 0 4px 12px rgba(233,69,96,0.4); }
    .hand-card .card-cost {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .hand-card .card-name-text {
      flex: 1; display: flex; align-items: center;
      word-break: break-word; hyphens: auto;
    }
    .hand-card .card-texture {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; image-rendering: pixelated; opacity: 0.2;
      pointer-events: none; z-index: 0;
    }
    .hand-card > * { position: relative; z-index: 1; }
    .hand-card .card-colors { display: none; }
    .hand-card .btn-build {
      width: 100%; font-size: 9px !important;
      padding: 4px 6px !important; border-radius: 4px;
    }
    .btn-build { font-size: 10px !important; padding: 2px 6px !important; }

    /* -- Actions -- */
    #my-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* -- Ban list (above journal) -- */
    #ban-list {
      font-size: 11px;
      color: #888;
      text-align: center;
      padding: 4px 8px;
      background: #0d1117;
      border-top: 1px solid #1a1f2e;
      flex-shrink: 0;
    }
    #ban-list:empty { display: none; }
    #ban-list .ban-up { color: #e94560; }
    #ban-list .ban-up .hero-portrait { border-radius: 50%; vertical-align: middle; opacity: 0.6; }

    /* -- Log (collapsible) -- */
    #log-toggle {
      display: block; width: 100%; padding: 4px;
      background: #0d1117; border: 1px solid #333; border-radius: 6px;
      color: #666; font-size: 11px; cursor: pointer; text-align: center;
      margin-top: 6px;
    }
    #log-toggle:hover { color: #aaa; }
    #game-log {
      display: none; background: #0d1117; border: 1px solid #333;
      border-radius: 0 0 8px 8px; padding: 6px;
      max-height: 150px; overflow-y: auto; font-size: 11px; line-height: 1.6;
    }
    #game-log.show { display: block; }
    #game-log .log-entry { color: #8b949e; }
    #game-log .log-entry .day-tag { color: #e94560; font-weight: bold; }

    /* ===== SHARED COMPONENTS ===== */

    /* District cards */
    .district-card {
      width: 100%; aspect-ratio: 5 / 6;
      border-radius: 6px; color: #000; font-weight: 600;
      display: inline-flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 4px 3px; font-size: 9px; text-align: center;
      border: 1.5px solid rgba(255,255,255,0.15);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      line-height: 1.2; position: relative; overflow: hidden;
    }
    .district-card .card-cost-badge {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .district-card .card-name {
      flex: 1; display: flex; align-items: center;
      word-break: break-word; hyphens: auto; padding: 1px 0;
    }
    .district-card .card-hp {
      font-size: 8px; opacity: 0.8;
      background: rgba(0,0,0,0.15); padding: 1px 4px; border-radius: 3px;
    }
    .district-card.spell-card {
      border: 2px solid #ffd166;
      box-shadow: 0 0 0 1px rgba(255, 235, 120, 0.45) inset, 0 0 12px rgba(255, 209, 102, 0.35);
    }
    .district-card .spell-badge {
      font-size: 8px;
      color: #ffe9a6;
      background: rgba(0,0,0,0.35);
      border: 1px dashed rgba(255, 230, 140, 0.8);
      border-radius: 4px;
      padding: 0 4px;
      margin-top: 1px;
    }
    .district-card svg { width: 10px; height: 10px; }
    .district-card .card-texture {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; image-rendering: pixelated; opacity: 0.25;
      pointer-events: none; z-index: 0;
    }
    .district-card > * { position: relative; z-index: 1; }
    .color-yellow { background: #f0c040; }
    .color-blue { background: #4090f0; color: #fff; }
    .color-green { background: #40c060; }
    .color-red { background: #e04050; color: #fff; }
    .color-purple { background: #9060e0; color: #fff; }

    /* Buttons */
    .btn {
      padding: 8px 14px; border: none; border-radius: 6px;
      font-size: 13px; cursor: pointer; font-weight: 600;
      transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn svg { width: 18px; height: 18px; }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #fff; }
    .btn-gold { background: #f0c040; color: #000; }
    .btn-card { background: #4090f0; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-large { width: 100%; max-width: 280px; padding: 12px 16px !important; font-size: 15px !important; }

    /* Draft — card-style hero selection */
    .draft-heroes {
      display: flex; flex-wrap: nowrap; gap: 6px;
      justify-content: center; padding: 4px 0;
      overflow-x: auto;
    }
    .hero-card {
      width: 0; min-width: 0; flex: 1 1 0;
      border-radius: 10px; border: 2px solid #0f3460;
      background: linear-gradient(180deg, #1a1a3e 0%, #16213e 100%);
      color: #eee; cursor: pointer; font-size: 11px;
      transition: all 0.2s;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; position: relative;
    }
    .hero-card:hover {
      border-color: var(--hero-clr, #e94560);
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5), 0 0 12px color-mix(in srgb, var(--hero-clr, #e94560) 30%, transparent);
    }
    .hero-card-portrait { width: 100%; height: 72px; overflow: hidden; background: #0d1117; }
    .hero-card-portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-card-body { padding: 6px 8px; display: flex; flex-direction: column; gap: 2px; }
    .hero-card-class {
      font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--hero-clr, #888); font-weight: 700;
      display: flex; align-items: center; gap: 4px;
    }
    .hero-card-color-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .hero-card-name { font-size: 11px; font-weight: 700; color: #eee; line-height: 1.2; }
    .hero-card-speed { font-size: 10px; color: #888; }
    .hero-card-ability { font-size: 10px; font-weight: 600; color: var(--hero-clr, #e94560); margin-top: 2px; }
    .hero-card-desc { font-size: 9px; color: #888; line-height: 1.3; margin-top: 2px; }

    /* Draft timer */
    .draft-timer {
      font-size: 14px; font-weight: 700; color: #f0c040;
      background: #0f3460; padding: 2px 8px; border-radius: 4px; margin-left: 8px;
    }
    .draft-timer.timer-urgent { color: #fff; background: #e94560; animation: pulse-banner 0.8s ease-in-out infinite; }

    /* Turn timer */
    .turn-timer {
      font-size: 13px; font-weight: 700; color: #f0c040;
      background: #0f3460; padding: 2px 8px; border-radius: 4px; margin-left: 8px;
    }
    .turn-timer.timer-urgent { color: #fff; background: #e94560; animation: pulse-banner 0.8s ease-in-out infinite; }

    /* Companion draft grid (4-slot, smaller than hero cards) */
    .companion-draft-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 4px 0;
      max-width: 480px;
      margin: 0 auto;
    }
    .companion-card {
      border-radius: 8px;
      border: 2px solid #0f3460;
      background: linear-gradient(180deg, #1a2a3e 0%, #16213e 100%);
      color: #eee;
      cursor: pointer;
      font-size: 10px;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow: hidden;
    }
    .companion-card:hover {
      border-color: #4090f0;
      transform: translateY(-3px);
      box-shadow: 0 4px 12px rgba(64,144,240,0.3);
    }
    .companion-card-portrait {
      width: 100%;
      height: 48px;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #555;
    }
    .companion-card-disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }
    .companion-card-disabled:hover {
      border-color: #0f3460;
      transform: none;
      box-shadow: none;
    }

    /* Purple draft grid */
    .purple-draft-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .purple-card-offer {
      background: linear-gradient(135deg, #2a1445 0%, #1a0a30 100%);
      border: 2px solid #9060e0;
      border-radius: 8px;
      padding: 12px 10px;
      cursor: pointer;
      text-align: center;
      width: 120px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .purple-card-offer:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(144, 96, 224, 0.4);
      border-color: #b080ff;
    }

    /* Clickable purple buildings */
    .district-wrapper { position: relative; display: inline-block; }
    .purple-clickable {
      cursor: pointer;
      border: 2px solid #9060e0;
      border-radius: 6px;
      animation: purple-pulse 2s infinite;
    }
    @keyframes purple-pulse {
      0%, 100% { box-shadow: 0 0 4px rgba(144, 96, 224, 0.3); }
      50% { box-shadow: 0 0 12px rgba(144, 96, 224, 0.7); }
    }
    .purple-tooltip {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1a0a30;
      border: 1px solid #9060e0;
      color: #ddd;
      font-size: 9px;
      padding: 4px 6px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }
    .purple-clickable:hover .purple-tooltip { display: block; }
    .companion-card-body {
      padding: 4px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .companion-card-name {
      font-size: 10px;
      font-weight: 700;
      color: #eee;
      line-height: 1.2;
    }
    .companion-card-desc {
      font-size: 8px;
      color: #888;
      line-height: 1.3;
    }
    .companion-card-empty {
      border: 2px dashed #1a2a3e;
      background: transparent;
      cursor: default;
      min-height: 90px;
    }
    .companion-card-empty:hover {
      border-color: #1a2a3e;
      transform: none;
      box-shadow: none;
    }
    .companion-card-empty .companion-card-portrait { display: none; }

    /* Companion indicator circle on hero portrait */
    .companion-indicator {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      border: 2px solid #16213e;
      z-index: 2;
    }
    .companion-indicator-me { background: #4090f0; }
    .companion-indicator-opp { background: #e04050; }

    /* Bans */
    .bans { font-size: 11px; color: #888; margin-top: 4px; text-align: center; }
    .bans .ban-up { color: #e94560; }
    .bans .ban-up svg { width: 14px; height: 14px; vertical-align: middle; }
    .bans .ban-up .hero-portrait { border-radius: 50%; vertical-align: middle; opacity: 0.6; }
    .btn .hero-portrait { border-radius: 50%; vertical-align: middle; }
    .hero-portrait { object-fit: cover; }

    /* Tooltip */
    .tooltip-host { position: relative; }
    .tooltip-content {
      display: none; position: absolute; z-index: 50;
      background: #16213e; border: 1px solid #e94560;
      border-radius: 8px; padding: 10px; font-size: 11px;
      color: #ccc; width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      line-height: 1.4; pointer-events: none;
    }
    .tooltip-content .tt-name { color: var(--hero-clr, #e94560); font-weight: 700; font-size: 13px; margin-bottom: 4px; }
    .tooltip-content .tt-class { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .tooltip-content .tt-ability { color: var(--hero-clr, #e94560); font-weight: 600; margin-top: 6px; }
    .tooltip-content .tt-desc { color: #aaa; margin-top: 2px; }
    .tooltip-host:hover .tooltip-content { display: block; }
    .tooltip-right .tooltip-content { left: calc(100% + 8px); top: 0; }
    .tooltip-left .tooltip-content { right: calc(100% + 8px); top: 0; }
    .tooltip-above .tooltip-content { bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); }
    .tooltip-below .tooltip-content { top: calc(100% + 8px); left: 50%; transform: translateX(-50%); }

    /* Menu screen */
    .menu-screen {
      display: flex; flex-direction: column; gap: 10px;
      padding: 20px 0; align-items: center;
    }
    .menu-title { font-size: 14px; color: #888; margin-bottom: 10px; }
    .menu-resources {
      width: 100%;
      max-width: 320px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      text-align: center;
      color: #ddd;
    }
    #menu-feature-panel {
      width: 100%;
      max-width: 320px;
    }
    .menu-feature-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .menu-feature-title {
      color: #e94560;
      font-weight: 700;
      font-size: 13px;
    }
    .menu-feature-text {
      color: #aaa;
      font-size: 12px;
    }
    .menu-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .menu-tab.active {
      border-color: #e94560;
      color: #fff;
    }
    .btn-small { font-size: 11px; padding: 4px 12px; border-radius: 4px; min-width: auto; }
    .menu-input {
      background: #16213e; border: 1px solid #0f3460; color: #eee;
      padding: 10px 14px; border-radius: 8px; font-size: 14px;
      width: 100%; max-width: 280px; text-align: center;
    }
    .menu-input:focus { outline: none; border-color: #e94560; }
    .menu-divider { color: #555; font-size: 12px; margin: 6px 0; }

    /* Auth */
    .auth-bar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; justify-content: center;
    }
    .auth-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #e94560;
    }
    .auth-nickname {
      color: #e94560; font-weight: bold; font-size: 13px;
      cursor: pointer;
    }
    .auth-nickname:hover { text-decoration: underline; }
    .auth-logout {
      font-size: 10px; color: #888; cursor: pointer;
      background: none; border: none; text-decoration: underline;
    }
    .auth-logout:hover { color: #e94560; }
    #google-signin-btn { margin-bottom: 8px; }

    /* Lobby */
    .lobby-screen { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 0; }
    .room-code {
      font-size: 20px; color: #e94560; background: #16213e;
      padding: 10px 20px; border-radius: 8px; border: 2px dashed #e94560; letter-spacing: 3px;
    }
    .lobby-info { font-size: 12px; color: #888; }
    .lobby-players { display: flex; flex-direction: column; gap: 4px; width: 100%; max-width: 300px; }
    .lobby-player {
      background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
      padding: 8px 12px; font-size: 14px;
    }
    .lobby-player.host { border-color: #e94560; }
    .lobby-count { font-size: 13px; color: #888; }
    .lobby-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    /* Ability modal */
    #ability-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      justify-content: center; align-items: center;
    }
    #ability-modal.show { display: flex; }
    #ability-modal .modal-content {
      background: #16213e; border: 1px solid #e94560;
      border-radius: 12px; padding: 16px; max-width: 90%; width: 350px;
    }
    #ability-modal h3 { margin-bottom: 10px; color: #e94560; font-size: 14px; }
    .modal-options { display: flex; flex-direction: column; gap: 6px; }
    .modal-option {
      padding: 8px 12px; border-radius: 6px; border: 1px solid #0f3460;
      background: #1a1a2e; color: #eee; cursor: pointer; font-size: 12px;
      text-align: left; display: flex; align-items: center; gap: 6px;
    }
    .modal-option svg { width: 20px; height: 20px; flex-shrink: 0; }
    .modal-option .hero-portrait { border-radius: 50%; flex-shrink: 0; }
    .modal-option:hover { border-color: #e94560; }

    /* Card pool modal */
    #card-pool-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 140;
      justify-content: center; align-items: center;
    }
    #card-pool-modal.show { display: flex; }
    #card-pool-modal .pool-content {
      background: #16213e; border: 1px solid #e94560; border-radius: 12px;
      width: min(92vw, 760px); max-height: 86vh; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .pool-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-bottom: 1px solid #0f3460;
    }
    .pool-header h3 { color: #e94560; font-size: 14px; }
    .pool-body { padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .pool-section h4 { color: #e94560; font-size: 12px; margin-bottom: 6px; }
    .pool-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
    .pool-item {
      background: #101a32; border: 1px solid #0f3460; border-radius: 8px;
      padding: 6px 8px;
    }
    .pool-item-title { font-size: 12px; color: #eee; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .pool-item-sub { font-size: 10px; color: #9aa5b1; margin-top: 2px; line-height: 1.3; }
    /* Keyword highlights */
    .kw { font-weight: 700; letter-spacing: 0.3px; cursor: default; border-bottom: 1px dotted currentColor; }
    /* Pool tabs */
    .pool-tabs { display: flex; gap: 4px; padding-bottom: 8px; border-bottom: 1px solid #0f3460; margin-bottom: 8px; flex-shrink: 0; }
    .pool-tab { background: #101a32; border: 1px solid #0f3460; border-radius: 6px; color: #9aa5b1; padding: 5px 12px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .pool-tab:hover { border-color: #e94560; color: #eee; }
    .pool-tab.active { background: #e94560; color: #fff; border-color: #e94560; }
    /* Guide styles */
    .guide-content h4 { color: #e94560; font-size: 13px; margin: 10px 0 4px; }
    .guide-content p, .guide-content li { font-size: 11px; color: #ccd; line-height: 1.5; }
    .guide-content ol, .guide-content ul { padding-left: 18px; margin: 4px 0; }
    .guide-content li { margin-bottom: 3px; }
    .guide-section { margin-bottom: 10px; }
    .keywords-grid { grid-template-columns: 1fr !important; }
    .kw-item .pool-item-title { font-size: 14px; }
    /* Income offer cards (draft-style pick) */
    .income-offer-panel { width: 100%; }
    .income-offer-panel .hint { text-align: center; margin-bottom: 6px; color: #e2b714; font-weight: 600; }
    .income-offer-grid { display: flex; gap: 10px; justify-content: center; }
    .income-offer-card {
      position: relative; width: 100px; height: 130px; border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      padding: 8px 6px; cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
      overflow: hidden; transition: transform 0.15s, box-shadow 0.15s;
    }
    .income-offer-card:hover { transform: scale(1.08); box-shadow: 0 0 16px rgba(233,69,96,0.6); border-color: #e94560; }
    .income-offer-card .card-texture { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; pointer-events: none; }
    .income-offer-card .card-cost-badge { position: absolute; top: 6px; left: 6px; background: #16213e; color: #e2b714; font-weight: 700; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; border: 1px solid #e2b714; z-index: 1; }
    .income-offer-card .card-name { position: relative; z-index: 1; font-size: 11px; text-align: center; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

    /* Winner */
    #winner-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 200;
      justify-content: center; align-items: center;
    }
    #winner-overlay.show { display: flex; }
    #winner-overlay .winner-card {
      text-align: center; padding: 24px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      border-radius: 16px; font-size: 20px; font-weight: bold; max-width: 90%;
    }

    /* ===== PORTRAIT PHONE HINT ===== */
    @media (max-width: 600px) and (orientation: portrait) {
      #landscape-hint {
        display: flex; position: fixed; inset: 0;
        background: rgba(0,0,0,0.85); z-index: 300;
        justify-content: center; align-items: center;
        flex-direction: column; gap: 12px; color: #aaa; font-size: 14px;
      }
      #landscape-hint .rotate-icon { font-size: 48px; animation: rotate-hint 2s ease-in-out infinite; }
      @keyframes rotate-hint {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
      }
      #landscape-hint .dismiss-btn {
        margin-top: 8px; padding: 8px 16px;
        background: #0f3460; border: 1px solid #e94560;
        color: #eee; border-radius: 6px; cursor: pointer; font-size: 12px;
      }
    }
    @media (min-width: 601px), (orientation: landscape) {
      #landscape-hint { display: none !important; }
    }

    /* ===== LANDSCAPE PHONE LAYOUT ===== */
    @media (max-height: 500px) and (orientation: landscape) {
      body { font-size: 12px; }
      #game-board {
        flex-direction: row;
        flex-wrap: wrap;
        height: 100vh;
        height: 100dvh;
        max-width: 100%;
      }
      /* Top strip: banner full width */
      #turn-banner {
        width: 100%;
        padding: 3px 8px;
        font-size: 11px;
        min-height: 26px;
        order: 0;
      }
      /* Left column: opponent tabs + opponent board */
      #opponent-tabs {
        flex-direction: column;
        width: 120px;
        max-height: calc(100dvh - 26px);
        overflow-y: auto;
        border-bottom: none;
        border-right: 1px solid #0f3460;
        order: 1;
      }
      .opp-tab { padding: 4px 4px; font-size: 10px; }
      #opponent-board {
        width: calc(50% - 120px);
        min-height: 0;
        max-height: calc(100dvh - 26px);
        overflow-y: auto;
        border-bottom: none;
        border-right: 1px solid #0f3460;
        order: 2;
      }
      /* Right side: my board */
      #my-board {
        width: 50%;
        max-height: calc(100dvh - 26px);
        overflow-y: auto;
        padding: 4px 8px;
        border-top: none;
        order: 3;
      }
      /* Center: draft area */
      #center-area {
        max-height: calc(100dvh - 26px);
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        order: 2;
      }
      .draft-heroes { gap: 6px; }
      .hero-card-desc { display: none; }
      /* Cards compact */
      .hand-card { width: 64px; min-height: 84px; font-size: 8px; }
      .hand-card .card-cost { width: 18px; height: 18px; font-size: 11px; }
      .district-card { font-size: 8px; }
      .district-card .card-cost-badge { width: 18px; height: 18px; font-size: 11px; }
      h2 { font-size: 13px; padding: 3px 6px; }
      .my-stats-bar { font-size: 11px; gap: 6px; }
      .opp-stats-bar { font-size: 11px; }
      .my-hero-row .hero-icon-large .hero-portrait { width: 36px; height: 36px; }
      .opp-hero-display .hero-icon-large .hero-portrait { width: 40px; height: 40px; }
      .my-districts { grid-template-columns: repeat(4, 1fr); gap: 3px; }
      .opp-districts { grid-template-columns: repeat(4, 1fr); gap: 3px; }
      /* Ban list */
      #ban-list { padding: 2px 8px; font-size: 10px; width: 100%; order: 4; }
      /* Log */
      #log-toggle { font-size: 10px; padding: 2px; margin-top: 2px; width: 100%; order: 5; }
      #game-log { max-height: 80px; font-size: 10px; width: 100%; order: 6; }
      /* Tooltip: always show above in landscape to prevent clipping */
      .tooltip-host:hover .tooltip-content { display: block; }
      .tooltip-right .tooltip-content,
      .tooltip-left .tooltip-content {
        left: 50%; right: auto; top: auto;
        bottom: calc(100% + 8px);
        transform: translateX(-50%);
      }
      /* Btn compact */
      .btn { padding: 6px 10px; font-size: 12px; }
    }

    /* ===== TABLET / DESKTOP LANDSCAPE ===== */
    @media (min-height: 501px) and (min-width: 900px) {
      #game-board {
        max-width: 800px;
      }
      .opp-districts { grid-template-columns: repeat(5, 1fr); }
      .my-districts { grid-template-columns: repeat(5, 1fr); }
    }

    /* ===== SMALL PORTRAIT SCREENS ===== */
    @media (max-width: 400px) {
      .hand-card { width: 64px; min-height: 84px; font-size: 8px; }
      .hand-card .card-cost { width: 18px; height: 18px; font-size: 11px; }
      .district-card { font-size: 8px; }
      .district-card .card-cost-badge { width: 18px; height: 18px; font-size: 11px; }
      .btn { padding: 6px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="landscape-hint">
    <div class="rotate-icon">📱↪️</div>
    <div>Поверните телефон горизонтально / Turn your phone sideways</div>
    <button class="dismiss-btn" onclick="this.parentElement.style.display='none'">OK, продолжить / Continue</button>
  </div>
  <div id="app">
    <h1>⚔ Darms: Fortresses</h1>
  </div>
  <div id="ability-modal">
    <div class="modal-content">
      <h3 id="modal-title"></h3>
      <div class="modal-options" id="modal-options"></div>
    </div>
  </div>
  <div id="card-pool-modal">
    <div class="pool-content">
      <div class="pool-header">
        <h3 id="card-pool-title"></h3>
        <button class="btn btn-secondary btn-small" id="card-pool-close"></button>
      </div>
      <div class="pool-body" id="card-pool-body"></div>
    </div>
  </div>
  <div id="winner-overlay">
    <div class="winner-card" id="winner-card"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
