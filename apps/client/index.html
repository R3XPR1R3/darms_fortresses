<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Darms: Fortresses</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-size: 14px;
    }
    h1 { font-size: 22px; text-align: center; margin-bottom: 8px; color: #e94560; letter-spacing: 1px; }
    h2 { font-size: 15px; margin-bottom: 6px; color: #0f3460; background: #e94560; padding: 4px 8px; border-radius: 4px; }
    .phase-label { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .hint { font-size: 12px; color: #aaa; margin: 6px 0; }

    /* Layout */
    #app { max-width: 600px; margin: 0 auto; padding: 8px; }

    /* ===== GAME BOARD LAYOUT ===== */
    #game-board {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
    }

    /* -- Turn Banner -- */
    #turn-banner {
      background: linear-gradient(90deg, #0f3460, #16213e);
      border-bottom: 2px solid #0f3460;
      padding: 6px 12px;
      text-align: center;
      font-size: 13px;
      color: #aaa;
      flex-shrink: 0;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #turn-banner.my-turn {
      background: linear-gradient(90deg, #e94560, #c02040);
      color: #fff;
      font-weight: 700;
      animation: pulse-banner 1.5s ease-in-out infinite;
    }
    @keyframes pulse-banner {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    #turn-banner svg { width: 18px; height: 18px; }
    #turn-banner .hero-portrait { border-radius: 50%; vertical-align: middle; }

    /* -- Opponent Tabs -- */
    #opponent-tabs {
      display: flex;
      gap: 0;
      flex-shrink: 0;
      background: #0d1117;
      border-bottom: 1px solid #0f3460;
    }
    .opp-tab {
      flex: 1;
      padding: 8px 6px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: #0d1117;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .opp-tab:hover { background: #16213e; }
    .opp-tab.active {
      color: #eee;
      border-bottom-color: var(--hero-clr, #e94560);
      background: #16213e;
    }
    .opp-tab.is-current-turn {
      color: var(--hero-clr, #e94560);
    }
    .opp-tab .tab-hero { font-size: 10px; color: var(--hero-clr, #e94560); }
    .opp-tab .tab-hero svg { width: 14px; height: 14px; vertical-align: middle; }
    .opp-tab .tab-hero .hero-portrait { border-radius: 50%; vertical-align: middle; border: 1px solid var(--hero-clr, #e94560); }
    .opp-tab .tab-stats { font-size: 10px; color: #666; }
    .opp-tab .tab-sleep { font-size: 12px; opacity: 0.5; }
    .opp-tab .active-arrow { color: var(--hero-clr, #e94560); font-size: 10px; line-height: 1; }

    /* -- Opponent Board -- */
    #opponent-board {
      flex: 1;
      min-height: 160px;
      overflow-y: auto;
      padding: 8px;
      background: #12182a;
      border-bottom: 1px solid #0f3460;
    }
    .opp-hero-display {
      text-align: center;
      margin-bottom: 8px;
    }
    .opp-hero-display .hero-icon-large svg { width: 48px; height: 48px; }
    .opp-hero-display .hero-icon-large .hero-portrait { border-radius: 50%; border: 2px solid var(--hero-clr, #e94560); box-shadow: 0 2px 8px color-mix(in srgb, var(--hero-clr, #e94560) 40%, transparent); }
    .opp-hero-display .hero-name { font-size: 14px; font-weight: 600; color: var(--hero-clr, #e94560); }
    .opp-hero-display .hero-speed { font-size: 11px; color: #888; }
    .opp-hero-display .sleep-display {
      font-size: 32px;
      opacity: 0.4;
      margin: 4px 0;
    }
    .opp-stats-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      font-size: 13px;
      color: #aaa;
      margin: 6px 0;
    }
    .opp-districts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      padding: 4px 0;
    }
    .opp-assassinated {
      text-align: center;
      color: #e94560;
      font-size: 13px;
      margin-top: 4px;
    }

    /* -- Center Area (Draft / phase info) -- */
    #center-area {
      flex-shrink: 0;
      max-height: 40vh;
      overflow-y: auto;
      padding: 8px;
    }

    /* -- My Board -- */
    #my-board {
      flex-shrink: 0;
      background: #16213e;
      border-top: 2px solid #0f3460;
      padding: 8px;
      overflow-y: auto;
      max-height: 38vh;
    }
    .my-hero-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .my-hero-row .hero-icon-large svg { width: 40px; height: 40px; }
    .my-hero-row .hero-icon-large .hero-portrait { border-radius: 50%; border: 2px solid var(--hero-clr, #e94560); box-shadow: 0 2px 8px color-mix(in srgb, var(--hero-clr, #e94560) 30%, transparent); }
    .my-hero-row .my-hero-info { flex: 1; }
    .my-hero-row .my-hero-name { font-size: 14px; font-weight: 700; color: var(--hero-clr, #e94560); }
    .my-hero-row .my-hero-speed { font-size: 11px; color: #888; }
    .my-hero-row .my-hero-ability-tag {
      font-size: 10px;
      background: #0f3460;
      color: #aaa;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .my-stats-bar {
      display: flex;
      gap: 12px;
      font-size: 13px;
      color: #ccc;
      margin-bottom: 6px;
      padding: 4px 0;
      border-bottom: 1px solid #0f3460;
    }
    .my-districts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
      padding: 4px 0;
    }
    .my-districts:empty { display: none; }

    /* -- Hand -- */
    #my-hand { margin-bottom: 6px; }
    #my-hand h3 { font-size: 12px; color: #e94560; margin-bottom: 4px; }
    .hand-cards { display: flex; flex-wrap: wrap; gap: 6px; }
    .hand-card {
      width: 90px;
      min-height: 126px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.15);
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 8px 6px;
      font-size: 11px;
      text-align: center;
      line-height: 1.3;
      color: #000;
      font-weight: 600;
      flex-shrink: 0;
    }
    .hand-card:hover { transform: scale(1.08); border-color: #e94560; box-shadow: 0 4px 12px rgba(233,69,96,0.4); }
    .hand-card .card-cost {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .hand-card .card-name-text {
      flex: 1;
      display: flex;
      align-items: center;
      word-break: break-word;
      hyphens: auto;
    }
    .hand-card .card-colors { display: none; }
    .hand-card .btn-build {
      width: 100%;
      font-size: 9px !important;
      padding: 4px 6px !important;
      border-radius: 4px;
    }
    .btn-build { font-size: 10px !important; padding: 2px 6px !important; }

    /* -- Actions -- */
    #my-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* -- Ban list (above journal) -- */
    #ban-list {
      font-size: 11px;
      color: #888;
      text-align: center;
      padding: 4px 8px;
      background: #0d1117;
      border-top: 1px solid #1a1f2e;
      flex-shrink: 0;
    }
    #ban-list:empty { display: none; }
    #ban-list .ban-up { color: #e94560; }
    #ban-list .ban-up .hero-portrait { border-radius: 50%; vertical-align: middle; opacity: 0.6; }

    /* -- Log (collapsible) -- */
    #log-toggle {
      display: block;
      width: 100%;
      padding: 4px;
      background: #0d1117;
      border: 1px solid #333;
      border-radius: 6px;
      color: #666;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      margin-top: 6px;
    }
    #log-toggle:hover { color: #aaa; }
    #game-log {
      display: none;
      background: #0d1117;
      border: 1px solid #333;
      border-radius: 0 0 8px 8px;
      padding: 6px;
      max-height: 150px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.6;
    }
    #game-log.show { display: block; }
    #game-log .log-entry { color: #8b949e; }
    #game-log .log-entry .day-tag { color: #e94560; font-weight: bold; }

    /* ===== SHARED COMPONENTS ===== */

    /* District cards (poker-card proportions, ~2.5:3.5 ratio) */
    .district-card {
      width: 90px;
      height: 126px;
      border-radius: 8px;
      color: #000;
      font-weight: 600;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 8px 6px;
      font-size: 11px;
      text-align: center;
      border: 2px solid rgba(255,255,255,0.15);
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      line-height: 1.3;
      flex-shrink: 0;
      position: relative;
    }
    .district-card .card-cost-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .district-card .card-name {
      flex: 1;
      display: flex;
      align-items: center;
      word-break: break-word;
      hyphens: auto;
      padding: 2px 0;
    }
    .district-card .card-hp {
      font-size: 9px;
      opacity: 0.8;
      background: rgba(0,0,0,0.15);
      padding: 1px 6px;
      border-radius: 4px;
    }
    .district-card svg { width: 10px; height: 10px; }
    .color-yellow { background: #f0c040; }
    .color-blue { background: #4090f0; color: #fff; }
    .color-green { background: #40c060; }
    .color-red { background: #e04050; color: #fff; }
    .color-purple { background: #9060e0; color: #fff; }

    /* Buttons */
    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn svg { width: 18px; height: 18px; }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #fff; }
    .btn-gold { background: #f0c040; color: #000; }
    .btn-card { background: #4090f0; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-large { width: 100%; max-width: 280px; padding: 12px 16px !important; font-size: 15px !important; }

    /* Draft */
    .draft-heroes { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .hero-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: 2px solid #0f3460;
      background: #16213e;
      color: #eee;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 80px;
    }
    .hero-btn:hover { border-color: #e94560; background: #1a1a3e; transform: scale(1.05); }
    .hero-btn .speed { color: #aaa; font-size: 10px; }
    .hero-btn-icon svg { width: 36px; height: 36px; }
    .hero-btn-icon .hero-portrait { border-radius: 8px; border: 2px solid #0f3460; transition: all 0.15s; }
    .hero-btn:hover .hero-btn-icon .hero-portrait { border-color: #e94560; }
    .hero-btn-name { font-weight: 600; font-size: 11px; }

    /* Draft timer */
    .draft-timer {
      font-size: 14px;
      font-weight: 700;
      color: #f0c040;
      background: #0f3460;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .draft-timer.timer-urgent {
      color: #fff;
      background: #e94560;
      animation: pulse-banner 0.8s ease-in-out infinite;
    }

    /* Turn timer */
    .turn-timer {
      font-size: 13px;
      font-weight: 700;
      color: #f0c040;
      background: #0f3460;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .turn-timer.timer-urgent {
      color: #fff;
      background: #e94560;
      animation: pulse-banner 0.8s ease-in-out infinite;
    }

    /* Bans */
    .bans { font-size: 11px; color: #888; margin-top: 4px; text-align: center; }
    .bans .ban-up { color: #e94560; }
    .bans .ban-up svg { width: 14px; height: 14px; vertical-align: middle; }
    .bans .ban-up .hero-portrait { border-radius: 50%; vertical-align: middle; opacity: 0.6; }
    .btn .hero-portrait { border-radius: 50%; vertical-align: middle; }
    .hero-portrait { object-fit: cover; }

    /* Menu screen */
    .menu-screen {
      display: flex; flex-direction: column; gap: 10px;
      padding: 20px 0; align-items: center;
    }
    .menu-title { font-size: 14px; color: #888; margin-bottom: 10px; }
    .btn-small {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 4px;
      min-width: auto;
    }
    .menu-input {
      background: #16213e; border: 1px solid #0f3460; color: #eee;
      padding: 10px 14px; border-radius: 8px; font-size: 14px;
      width: 100%; max-width: 280px; text-align: center;
    }
    .menu-input:focus { outline: none; border-color: #e94560; }
    .menu-divider { color: #555; font-size: 12px; margin: 6px 0; }

    /* Lobby */
    .lobby-screen {
      display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 0;
    }
    .room-code {
      font-size: 20px; color: #e94560; background: #16213e;
      padding: 10px 20px; border-radius: 8px; border: 2px dashed #e94560;
      letter-spacing: 3px;
    }
    .lobby-info { font-size: 12px; color: #888; }
    .lobby-players { display: flex; flex-direction: column; gap: 4px; width: 100%; max-width: 300px; }
    .lobby-player {
      background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
      padding: 8px 12px; font-size: 14px;
    }
    .lobby-player.host { border-color: #e94560; }
    .lobby-count { font-size: 13px; color: #888; }
    .lobby-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    /* Ability modal */
    #ability-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    #ability-modal.show { display: flex; }
    #ability-modal .modal-content {
      background: #16213e;
      border: 1px solid #e94560;
      border-radius: 12px;
      padding: 16px;
      max-width: 90%;
      width: 350px;
    }
    #ability-modal h3 { margin-bottom: 10px; color: #e94560; font-size: 14px; }
    .modal-options { display: flex; flex-direction: column; gap: 6px; }
    .modal-option {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #eee;
      cursor: pointer;
      font-size: 12px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .modal-option svg { width: 20px; height: 20px; flex-shrink: 0; }
    .modal-option .hero-portrait { border-radius: 50%; flex-shrink: 0; }
    .modal-option:hover { border-color: #e94560; }

    /* Winner */
    #winner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    #winner-overlay.show { display: flex; }
    #winner-overlay .winner-card {
      text-align: center;
      padding: 24px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      border-radius: 16px;
      font-size: 20px;
      font-weight: bold;
      max-width: 90%;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>⚔ Darms: Fortresses</h1>
  </div>
  <div id="ability-modal">
    <div class="modal-content">
      <h3 id="modal-title"></h3>
      <div class="modal-options" id="modal-options"></div>
    </div>
  </div>
  <div id="winner-overlay">
    <div class="winner-card" id="winner-card"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
